name: Build & Upload to Appetize.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project IKSubsea.xcodeproj \
            -scheme IKSubsea \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Find and inspect .app bundle
        run: |
          echo "=== All build products ==="
          find build/Build/Products -type d -name "*.app"
          echo ""
          APP_PATH=$(find build/Build/Products -type d -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find build/Build/Products -type f | head -30
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"
          echo "Size: $(du -sh "$APP_PATH" | cut -f1)"
          ls -la "$APP_PATH/"

      - name: Zip .app bundle
        run: |
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/IKSubsea.zip" "$(basename "$APP_PATH")"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/IKSubsea.zip" >> $GITHUB_ENV
          echo "Zip size: $(du -sh "$GITHUB_WORKSPACE/IKSubsea.zip" | cut -f1)"

      - name: Upload to Appetize.io
        run: |
          RESPONSE=$(curl --silent --show-error \
            -X POST \
            -H "Authorization: Token ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@${{ env.ZIP_PATH }}" \
            -F "platform=ios" \
            -F "deviceType=ipadAir4thGeneration" \
            -F "osVersion=18" \
            "https://api.appetize.io/v1/apps/${{ secrets.APPETIZE_PUBLIC_KEY }}")
          echo "Appetize response: $RESPONSE"

      - name: Upload .app zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IKSubsea-simulator-build
          path: IKSubsea.zip
          retention-days: 14
