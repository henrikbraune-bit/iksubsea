name: Build & Upload to Appetize.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-14

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -i ipad | head -10

      - name: Build for iOS Simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable'):
                      print(d['udid'])
                      exit(0)
          ")
          echo "Building for simulator: $SIM_ID"
          xcodebuild \
            -project IKSubsea.xcodeproj \
            -scheme IKSubsea \
            -configuration Debug \
            -destination "id=$SIM_ID" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            build

      - name: Find and inspect .app bundle
        run: |
          echo "=== All build products ==="
          find build/Build/Products -type d -name "*.app"
          echo ""
          APP_PATH=$(find build/Build/Products -type d -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find build/Build/Products -type f | head -30
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"
          echo "Size: $(du -sh "$APP_PATH" | cut -f1)"
          echo "=== Contents ==="
          ls -la "$APP_PATH/"
          echo "=== JSON files in bundle ==="
          find "$APP_PATH" -name "*.json" | grep -v xcassets || echo "NO JSON FILES FOUND IN BUNDLE"

      - name: Zip .app bundle (for Appetize)
        run: |
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/IKSubsea.zip" "$(basename "$APP_PATH")"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/IKSubsea.zip" >> $GITHUB_ENV
          echo "Zip size: $(du -sh "$GITHUB_WORKSPACE/IKSubsea.zip" | cut -f1)"

      - name: Package as .ipa (for BrowserStack)
        run: |
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r "$GITHUB_WORKSPACE/IKSubsea.ipa" Payload
          echo "IPA size: $(du -sh "$GITHUB_WORKSPACE/IKSubsea.ipa" | cut -f1)"

      - name: Upload to Appetize.io
        run: |
          RESPONSE=$(curl --silent --show-error \
            -X POST \
            -H "Authorization: Token ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@${{ env.ZIP_PATH }}" \
            -F "platform=ios" \
            -F "deviceType=ipadAir4thGeneration" \
            -F "osVersion=17" \
            "https://api.appetize.io/v1/apps/${{ secrets.APPETIZE_PUBLIC_KEY }}")
          echo "Appetize response: $RESPONSE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IKSubsea-simulator-build
          path: |
            IKSubsea.zip
            IKSubsea.ipa
          retention-days: 30
