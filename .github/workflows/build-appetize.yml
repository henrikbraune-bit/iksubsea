name: Build & Upload to Appetize.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-and-upload:
    runs-on: macos-15   # Apple Silicon Mac with Xcode 16

    steps:

      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ───────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── 3. Install iOS runtime ────────────────────────────────────────
      - name: Install iOS 18 Simulator Runtime
        run: xcodebuild -downloadPlatform iOS

      # ── 4. Pick a real simulator UDID ─────────────────────────────────
      - name: Pick simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and 'iPad' in d['name']:
                      print(d['udid'])
                      exit(0)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable'):
                      print(d['udid'])
                      exit(0)
          ")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          echo "Using simulator: $UDID"
          xcrun simctl list devices available | grep "$UDID"

      # ── 5. Boot simulator ─────────────────────────────────────────────
      - name: Boot simulator
        run: |
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl list devices | grep "$SIMULATOR_UDID"

      # ── 6. Build for booted simulator ─────────────────────────────────
      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project IKSubsea.xcodeproj \
            -scheme IKSubsea \
            -configuration Debug \
            -destination "id=$SIMULATOR_UDID" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tail -50

      # ── 7. Find and inspect the .app bundle ───────────────────────────
      - name: Find .app bundle
        run: |
          echo "=== Searching for .app ==="
          find build/Build/Products -name "*.app" -type d
          APP_PATH=$(find build/Build/Products -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"
          echo "Size: $(du -sh "$APP_PATH" | cut -f1)"
          ls -la "$APP_PATH"

      # ── 8. Zip the .app bundle ────────────────────────────────────────
      - name: Zip .app bundle
        run: |
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/IKSubsea.zip" "$(basename "$APP_PATH")"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/IKSubsea.zip" >> $GITHUB_ENV
          echo "Zip size: $(du -sh "$GITHUB_WORKSPACE/IKSubsea.zip" | cut -f1)"

      # ── 9. Upload to Appetize.io ──────────────────────────────────────
      - name: Upload to Appetize.io
        id: appetize_upload
        run: |
          RESPONSE=$(curl --silent --show-error \
            -X POST \
            -H "Authorization: Token ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@${{ env.ZIP_PATH }}" \
            -F "platform=ios" \
            -F "deviceType=ipadAir4thGeneration" \
            -F "osVersion=18" \
            -F "note=IK Subsea Solutions App - auto build" \
            "https://api.appetize.io/v1/apps/${{ secrets.APPETIZE_PUBLIC_KEY }}")
          echo "Appetize response: $RESPONSE"
          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('publicKey','ERROR'))")
          echo "APPETIZE_URL=https://appetize.io/app/$APP_URL" >> $GITHUB_ENV

      # ── 10. Print the shareable URL ───────────────────────────────────
      - name: Print shareable URL
        run: |
          echo "============================================="
          echo "  IK Subsea App: ${{ env.APPETIZE_URL }}"
          echo "============================================="

      # ── 11. Save zip as artifact ──────────────────────────────────────
      - name: Upload .app zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IKSubsea-simulator-build
          path: IKSubsea.zip
          retention-days: 14
